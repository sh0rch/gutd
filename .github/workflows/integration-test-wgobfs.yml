name: TC/XDP Integration Test (Wg-obfuscator)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    name: Wg-obfuscator Integration Test
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Download wg-obfuscator binary
      run: |
        mkdir -p /tmp/wg-obfs
        cd /tmp/wg-obfs
        curl -LO https://github.com/ClusterM/wg-obfuscator/releases/download/v1.5/wg-obfuscator-v1.5-linux-x64.tar.gz
        tar xf wg-obfuscator-v1.5-linux-x64.tar.gz
        mv wg-obfuscator/wg-obfuscator /tmp/wg-obfs/
        chmod +x /tmp/wg-obfs/wg-obfuscator
        /tmp/wg-obfs/wg-obfuscator --help

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y iperf3 iproute2 iputils-ping wireguard-tools

    - name: Setup namespaces & run obfuscator test
      run: |
        set -ex
        WG_OBFS="/tmp/wg-obfs/wg-obfuscator"
        KEY="0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
        PORTS="41000"

        # Cleanup any leftovers
        sudo pkill -9 wg-obfuscator 2>/dev/null || true
        sudo ip netns del ns1 2>/dev/null || true
        sudo ip netns del ns2 2>/dev/null || true
        sleep 0.2

        # --- Namespaces and transport veth ---
        sudo ip netns add ns1
        sudo ip netns add ns2
        sudo ip link add veth1 type veth peer name veth2
        sudo ip link set veth1 netns ns1
        sudo ip link set veth2 netns ns2
        sudo ip netns exec ns1 bash -c 'ip link set lo up; ip link set veth1 up; ip addr add 10.0.0.1/24 dev veth1'
        sudo ip netns exec ns2 bash -c 'ip link set lo up; ip link set veth2 up; ip addr add 10.0.0.2/24 dev veth2'
        
        # Verify transport connectivity
        echo "=== TRANSPORT PING ==="
        sudo ip netns exec ns1 ping -c1 -W2 10.0.0.2

        # --- WireGuard keys ---
        WG_CLIENT_PRIV=$(wg genkey)
        WG_CLIENT_PUB=$(echo "$WG_CLIENT_PRIV" | wg pubkey)
        WG_SERVER_PRIV=$(wg genkey)
        WG_SERVER_PUB=$(echo "$WG_SERVER_PRIV" | wg pubkey)

        # WG server config written to /tmp
        printf '[Interface]\nPrivateKey = %s\nListenPort = 51820\n\n[Peer]\nPublicKey = %s\nAllowedIPs = 10.200.0.1/32\n' \
          "$WG_SERVER_PRIV" "$WG_CLIENT_PUB" > /tmp/wg-server.conf

        # ============================================================
        # wg-obfuscator
        # ============================================================
        echo ""
        echo "========================================"
        echo " WireGuard through wg-obfuscator        "
        echo "========================================"

        # Run wg-obfuscator server in ns2 (listen on 10.0.0.2:41000, forward to 127.0.0.1:51820)
        sudo ip netns exec ns2 $WG_OBFS -i 10.0.0.2 -p $PORTS -t 127.0.0.1:51820 -k "$KEY" > /tmp/wg-obfs-server.log 2>&1 &
        G2PID=$!
        sleep 1

        # Run wg-obfuscator client in ns1 (listen on 127.0.0.1:41000, forward to 10.0.0.2:41000)
        sudo ip netns exec ns1 $WG_OBFS -i 127.0.0.1 -p $PORTS -t 10.0.0.2:$PORTS -k "$KEY" > /tmp/wg-obfs-client.log 2>&1 &
        G1PID=$!
        sleep 2

        if ! kill -0 $G1PID 2>/dev/null; then
          echo "FAIL: wg-obfs ns1 died"; cat /tmp/wg-obfs-client.log; exit 1
        fi
        if ! kill -0 $G2PID 2>/dev/null; then
          echo "FAIL: wg-obfs ns2 died"; cat /tmp/wg-obfs-server.log; exit 1
        fi
        echo "OK: wg-obfuscator running in both namespaces"

        # WG server in ns2
        sudo ip netns exec ns2 ip link add wg0 type wireguard
        sudo ip netns exec ns2 ip addr add 10.200.0.2/24 dev wg0
        sudo ip netns exec ns2 wg setconf wg0 /tmp/wg-server.conf
        sudo ip netns exec ns2 ip link set wg0 mtu 1420 up

        # WG client in ns1 — endpoint is local wg-obfuscator port (127.0.0.1:41000)
        printf '[Interface]\nPrivateKey = %s\n\n[Peer]\nPublicKey = %s\nEndpoint = 127.0.0.1:%s\nAllowedIPs = 10.200.0.0/24\nPersistentKeepalive = 5\n' \
          "$WG_CLIENT_PRIV" "$WG_SERVER_PUB" "$PORTS" > /tmp/wg-client-tunnel.conf
        sudo ip netns exec ns1 ip link add wg0 type wireguard
        sudo ip netns exec ns1 ip addr add 10.200.0.1/24 dev wg0
        sudo ip netns exec ns1 wg setconf wg0 /tmp/wg-client-tunnel.conf
        sudo ip netns exec ns1 ip link set wg0 mtu 1420 up

        sleep 4
        echo "--- WireGuard handshake ---"
        sudo ip netns exec ns1 wg show wg0
        sudo ip netns exec ns2 wg show wg0

        echo "=== Ping through wg-obfuscator ==="
        sudo ip netns exec ns1 ping -c5 -i0.2 -W3 10.200.0.2
        echo "PING: SUCCESS"

        set +e
        echo "=== iperf3 TCP (5s, via wg-obfuscator) ==="
        timeout 15 sudo ip netns exec ns2 iperf3 -s -1 -p 5201 &
        sleep 0.5
        timeout 15 sudo ip netns exec ns1 iperf3 -c 10.200.0.2 -p 5201 -P 4 -t 5 2>&1 | tee /tmp/iperf_wgobfs_tcp.txt || true
        WGOBFS_TCP=$(grep "SUM.*sender" /tmp/iperf_wgobfs_tcp.txt | awk '{print $6, $7}') || true
        [ -z "$WGOBFS_TCP" ] && WGOBFS_TCP=$(grep "sender" /tmp/iperf_wgobfs_tcp.txt | tail -1 | awk '{print $7, $8}') || true
        echo "TCP: $WGOBFS_TCP"

        echo "=== iperf3 UDP (5s, via wg-obfuscator) ==="
        timeout 15 sudo ip netns exec ns2 iperf3 -s -1 -p 5202 &
        sleep 0.5
        timeout 15 sudo ip netns exec ns1 iperf3 -c 10.200.0.2 -p 5202 -u -b 2G -t 5 2>&1 | tee /tmp/iperf_wgobfs_udp.txt || true
        WGOBFS_UDP=$(grep "sender" /tmp/iperf_wgobfs_udp.txt | awk '{print $7, $8}') || true
        WGOBFS_UDP_LOSS=$(grep "sender" /tmp/iperf_wgobfs_udp.txt | grep -oP '\(\K[^)]+' || echo "?")
        echo "UDP: $WGOBFS_UDP  loss: $WGOBFS_UDP_LOSS"
        set -e

        # --- Cleanup ---
        sudo kill $G1PID $G2PID 2>/dev/null || true
        sleep 0.3
        sudo kill -9 $G1PID $G2PID 2>/dev/null || true
        wait $G1PID $G2PID 2>/dev/null || true
        sudo ip netns del ns1 2>/dev/null || true
        sudo ip netns del ns2 2>/dev/null || true

        # ============================================================
        # RESULTS SUMMARY
        # ============================================================
        echo ""
        echo "========================================"
        echo " RESULTS SUMMARY                        "
        echo "========================================"
        echo "  TCP (wg-obfuscator):  $WGOBFS_TCP"
        echo "  UDP (wg-obfuscator):  $WGOBFS_UDP  loss: $WGOBFS_UDP_LOSS"
        echo "========================================"

        echo "=== ALL TESTS PASSED ==="

        # Write to step summary
        echo "## wg-obfuscator Performance" >> $GITHUB_STEP_SUMMARY
        echo "| Proto | Bandwidth | Packet Loss |" >> $GITHUB_STEP_SUMMARY
        echo "|---|---|---|" >> $GITHUB_STEP_SUMMARY
        echo "| **TCP** | $WGOBFS_TCP | - |" >> $GITHUB_STEP_SUMMARY
        echo "| **UDP** | $WGOBFS_UDP | $WGOBFS_UDP_LOSS |" >> $GITHUB_STEP_SUMMARY
